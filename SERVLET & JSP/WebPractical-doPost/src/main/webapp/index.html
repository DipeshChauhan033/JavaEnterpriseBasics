<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>

    <style>
        body{
            background-color: black;
             overflow: hidden;
        }
        .login{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 15px;
        }
        form{
            width: 100%;
            max-width: 400px;
            padding: 60px;
            background-color: white;
            border-radius: 15px;
            box-sizing: border-box;
        }
        #btn{

            width: 100%;
            height: 40px;
            border-radius: 10px;
            background-color: rgb(14,157,249);
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        label{
            font-size: large;
        }
        .field{
            width: 100%;
            height: 35px;
            border: 2px solid black;
            border-radius: 10px;
            padding: 5px 10px;
            margin-top: 5px;
            box-sizing: border-box;
            
        }
        img{
            display: block;
            margin: 0 auto 30px;
            max-width: 100px;
        }
        @media (max-width: 480px) {
            form {
                padding: 20px;
            }

            img {
                max-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="login">
        <form action="SignUpTest" method="post">
            <img src="logo.png" alt=""><br>
            <label>Username</label><br>
            <input class="field" type="text" name="username"><br><br>
            <label>Password</label><br>
            <input class="field" type="password" name="password" id=""><br><br><br>
            <button id="btn">Login</button>
        </form>
    </div>
</body>
</html>
