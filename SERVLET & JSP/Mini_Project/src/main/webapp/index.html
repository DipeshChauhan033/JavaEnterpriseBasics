<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Management</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
        background: #f2f2f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 400px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 22px;
        color: #000;
    }

    .menu {
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .menu a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px;
        text-decoration: none;
        color: #000;
        border-bottom: 1px solid #eee;
        transition: background 0.2s;
    }

    .menu a:last-child {
        border-bottom: none;
    }

    .menu a:hover {
        background: #f5f5f5;
    }

    .left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .icon {
        width: 22px;
        height: 22px;
    }

    .arrow {
        width: 16px;
        height: 16px;
        opacity: 0.5;
    }

    /* Colors like iOS */
    .add svg { fill: #34c759; }
    .read svg { fill: #007aff; }
    .update svg { fill: #ff9500; }
    .delete svg { fill: #ff3b30; }

</style>
</head>

<body>

<div class="container">
    <h1>Employee Management Dashboard</h1>

    <div class="menu">

        <a href="viewAddEmployee" class="add">
            <div class="left">
                <!-- Add Icon -->
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <span>Add Employee</span>
            </div>

            <svg class="arrow" viewBox="0 0 24 24">
                <path d="M9 6l6 6-6 6" stroke="#999" stroke-width="2" fill="none"/>
            </svg>
        </a>

        <a href="readEmployees" class="read">
            <div class="left">
                <!-- Read Icon -->
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M8 10h8M8 14h6" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Read Employee</span>
            </div>

            <svg class="arrow" viewBox="0 0 24 24">
                <path d="M9 6l6 6-6 6" stroke="#999" stroke-width="2" fill="none"/>
            </svg>
        </a>

        <a href="updateEmployeeData" class="update">
            <div class="left">
                <!-- Update Icon -->
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M4 20h4l10-10-4-4L4 16v4z" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <span>Update Employee</span>
            </div>

            <svg class="arrow" viewBox="0 0 24 24">
                <path d="M9 6l6 6-6 6" stroke="#999" stroke-width="2" fill="none"/>
            </svg>
        </a>

        <a href="deleteEmployee" class="delete">
            <div class="left">
                <!-- Delete Icon -->
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M6 7h12M9 7v12M15 7v12M5 7l1-2h12l1 2" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <span>Delete Employee</span>
            </div>

            <svg class="arrow" viewBox="0 0 24 24">
                <path d="M9 6l6 6-6 6" stroke="#999" stroke-width="2" fill="none"/>
            </svg>
        </a>

    </div>
</div>

</body>
</html>
